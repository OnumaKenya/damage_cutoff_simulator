services:
  - type: web
    name: damage-cutoff-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:server -b 0.0.0.0:$PORT --workers 1 --threads 2 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # OCR (スクショ→カード生成) は外部公開版では無効化する。
      # 有効化する場合は false を外し GOOGLE_VISION_API_KEY を設定すること。
      - key: ENABLE_OCR
        value: "false"
