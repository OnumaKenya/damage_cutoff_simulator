services:
  - type: web
    name: damage-cutoff-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:server -b 0.0.0.0:$PORT --workers 1 --threads 2 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: N_SAMPLES
        value: "100000"
      - key: N_CUTOFF_SAMPLES
        value: "100000"
